apiVersion: apps/v1
kind: Deployment
metadata:
  name: innovatech-backend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: innovatech-backend
  template:
    metadata:
      labels:
        app: innovatech-backend
    spec:
      containers:
      - name: backend
        
        image: 304744337786.dkr.ecr.us-east-1.amazonaws.com/innovatech-backend:latest
        ports:
        - containerPort: 5000 
---
apiVersion: v1
kind: Service
metadata:
  name: innovatech-backend-service
  namespace: default
spec:
  type: ClusterIP 
  - port: 5000
    targetPort: 5000
  selector:
    app: innovatech-backend
